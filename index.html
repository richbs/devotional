<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
    <script>
        // Data layer — consumed by script.js at parse time (before DOMContentLoaded)
        window.slides   = [".\/pages\/DB-01.png",".\/pages\/DB-02.png",".\/pages\/DB-03.png",".\/pages\/DB-04.png",".\/pages\/DB-05.png",".\/pages\/DB-06.png",".\/pages\/DB-07.png",".\/pages\/DB-08.png",".\/pages\/DB-09.png",".\/pages\/DB-10.png",".\/pages\/DB-11.png",".\/pages\/DB-12.png",".\/pages\/DB-13.png",".\/pages\/DB-14.png",".\/pages\/DB-15.png",".\/pages\/DB-16.png",".\/pages\/DB-17.png",".\/pages\/DB-18.png",".\/pages\/DB-19.png",".\/pages\/DB-20.png",".\/pages\/DB-21.png",".\/pages\/DB-22.png",".\/pages\/DB-23.png",".\/pages\/DB-24.png",".\/pages\/DB-25.png"];
        window.timeouts = [".\/timeout\/timeout01.png",".\/timeout\/timeout02.png",".\/timeout\/timeout03.png",".\/timeout\/timeout04.png"];
    </script>
</head>

<body>
    <main>
        <!-- Slide container — .leaf imgs injected here by script.js -->
        <article id="pages"></article>

        <!-- Progress bar — .nav-page buttons injected before .progress-dot by script.js -->
        <div class="progress">
            <span class="progress-dot" aria-hidden="true"></span>
        </div>

        <nav>
            <button type="button" id="nav-home" aria-label="First page">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
            </button>

            <!-- 5 jump buttons injected by script.js, each covering 20% of slides -->
            <div class="jumps"></div>

            <!-- Hidden — kept for screen-reader live region; display:none in CSS -->
            <p class="page-counter" aria-live="polite">Page <span id="page-current">1</span> of <span id="page-total"></span></p>

            <div class="nav-arrows">
                <button type="button" id="nav-prev" aria-label="Previous page">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 6 L8 12 L16 18 Z" />
                    </svg>
                </button>
                <button type="button" id="nav-next" aria-label="Next page">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 6 L16 12 L8 18 Z" />
                    </svg>
                </button>
            </div>
        </nav>
    </main>

    <!-- Timeout overlay div appended to <body> by script.js -->

    <script src="script.js"></script>
</body>

</html>
